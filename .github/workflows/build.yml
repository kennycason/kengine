name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-macos:
    runs-on: macos-14  # Apple Silicon (M1) runner
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Homebrew dependencies
        run: brew install sdl3 sdl3_image sdl3_ttf chipmunk cmake pkg-config

      - name: Cache SDL3 source builds
        uses: actions/cache@v4
        id: sdl-source-cache
        with:
          path: |
            /usr/local/lib/libSDL3_mixer*
            /usr/local/lib/libSDL3_net*
            /usr/local/include/SDL3_mixer
            /usr/local/include/SDL3_net
          key: sdl3-source-${{ runner.os }}-${{ hashFiles('.gitmodules', 'sdl3/build_sdl.sh') }}

      - name: Build SDL3_mixer and SDL3_net from source
        if: steps.sdl-source-cache.outputs.cache-hit != 'true'
        run: bash sdl3/build_sdl.sh

      - name: Verify SDL3 libraries
        run: |
          echo "=== Brew libs ==="
          ls /opt/homebrew/lib/libSDL3*.dylib
          echo "=== Source-built libs ==="
          ls /usr/local/lib/libSDL3_mixer* /usr/local/lib/libSDL3_net*

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build all modules and compile test binaries
        run: |
          ./gradlew clean build -x allTests -x nativeTest -x jvmTest -x jsTest
          ./gradlew :kengine:linkDebugTestNative \
                    :kengine-network:linkDebugTestNative \
                    :kengine-sound:linkDebugTestNative

      - name: Copy SDL dylibs for tests
        run: |
          for dir in kengine kengine-network kengine-sound; do
            fw_dir="$dir/build/bin/native/Frameworks"
            mkdir -p "$fw_dir"
            cp /opt/homebrew/lib/libSDL3.0.dylib "$fw_dir/" 2>/dev/null || true
            cp /opt/homebrew/lib/libSDL3_image.0.dylib "$fw_dir/" 2>/dev/null || true
            cp /opt/homebrew/lib/libSDL3_ttf.0.dylib "$fw_dir/" 2>/dev/null || true
            cp /usr/local/lib/libSDL3_mixer.0.dylib "$fw_dir/" 2>/dev/null || true
            cp /usr/local/lib/libSDL3_net.0.dylib "$fw_dir/" 2>/dev/null || true
          done
          echo "=== Dylib check ==="
          ls -la kengine/build/bin/native/Frameworks/*.dylib
          ls -la kengine-network/build/bin/native/Frameworks/*.dylib
          ls -la kengine-sound/build/bin/native/Frameworks/*.dylib

      - name: Run kengine unit tests
        run: |
          ./kengine/build/bin/native/debugTest/test.kexe \
            "--ktest_filter=*-*IT.*:*TiledMapLoaderTest.*"
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy

      - name: Run kengine-network tests
        if: always()
        run: |
          if [ -f ./kengine-network/build/bin/native/debugTest/test.kexe ]; then
            ./kengine-network/build/bin/native/debugTest/test.kexe
          fi
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy

      - name: Run kengine-sound tests
        if: always()
        run: |
          if [ -f ./kengine-sound/build/bin/native/debugTest/test.kexe ]; then
            ./kengine-sound/build/bin/native/debugTest/test.kexe
          fi
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy

  build-linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake pkg-config build-essential \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev libxss-dev \
            libwayland-dev libxkbcommon-dev libdrm-dev libgbm-dev libgl-dev libegl-dev \
            libasound2-dev libpulse-dev libpipewire-0.3-dev \
            libfreetype-dev libharfbuzz-dev \
            libjpeg-dev libpng-dev libwebp-dev libtiff-dev \
            libchipmunk-dev

      - name: Cache SDL3 source builds
        uses: actions/cache@v4
        id: sdl-source-cache
        with:
          path: |
            /usr/local/lib/libSDL3*
            /usr/local/include/SDL3
            /usr/local/include/SDL3_image
            /usr/local/include/SDL3_ttf
            /usr/local/include/SDL3_mixer
            /usr/local/include/SDL3_net
          key: sdl3-source-${{ runner.os }}-${{ hashFiles('.gitmodules', 'sdl3/build_sdl.sh') }}

      - name: Build all SDL3 libs from source
        if: steps.sdl-source-cache.outputs.cache-hit != 'true'
        run: bash sdl3/build_sdl.sh

      - name: Refresh linker cache
        run: sudo ldconfig

      - name: Verify SDL3 libraries
        run: |
          echo "=== SDL3 libs ==="
          ls -la /usr/local/lib/libSDL3*

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build all modules and compile test binaries
        run: |
          ./gradlew clean build -x allTests -x nativeTest -x jvmTest -x jsTest
          ./gradlew :kengine:linkDebugTestNative \
                    :kengine-network:linkDebugTestNative \
                    :kengine-sound:linkDebugTestNative

      - name: Copy SDL shared libs for tests
        run: |
          for dir in kengine kengine-network kengine-sound; do
            fw_dir="$dir/build/bin/native/Frameworks"
            mkdir -p "$fw_dir"
            cp /usr/local/lib/libSDL3.so.0 "$fw_dir/" 2>/dev/null || true
            cp /usr/local/lib/libSDL3_image.so.0 "$fw_dir/" 2>/dev/null || true
            cp /usr/local/lib/libSDL3_ttf.so.0 "$fw_dir/" 2>/dev/null || true
            cp /usr/local/lib/libSDL3_mixer.so.0 "$fw_dir/" 2>/dev/null || true
            cp /usr/local/lib/libSDL3_net.so.0 "$fw_dir/" 2>/dev/null || true
          done
          echo "=== Shared lib check ==="
          ls -la kengine/build/bin/native/Frameworks/

      - name: Run kengine unit tests
        run: |
          ./kengine/build/bin/native/debugTest/test.kexe \
            "--ktest_filter=*-*IT.*:*TiledMapLoaderTest.*"
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
          LD_LIBRARY_PATH: /usr/local/lib

      - name: Run kengine-network tests
        if: always()
        run: |
          if [ -f ./kengine-network/build/bin/native/debugTest/test.kexe ]; then
            ./kengine-network/build/bin/native/debugTest/test.kexe
          fi
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
          LD_LIBRARY_PATH: /usr/local/lib

      - name: Run kengine-sound tests
        if: always()
        run: |
          if [ -f ./kengine-sound/build/bin/native/debugTest/test.kexe ]; then
            ./kengine-sound/build/bin/native/debugTest/test.kexe
          fi
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
          LD_LIBRARY_PATH: /usr/local/lib

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-freetype
            mingw-w64-x86_64-harfbuzz
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-libwebp
            mingw-w64-x86_64-libtiff
            mingw-w64-x86_64-chipmunk
            mingw-w64-x86_64-make

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache SDL3 source builds
        uses: actions/cache@v4
        id: sdl-source-cache
        with:
          path: |
            D:\a\_temp\msys64\mingw64\lib\libSDL3*
            D:\a\_temp\msys64\mingw64\bin\SDL3*
            D:\a\_temp\msys64\mingw64\bin\libSDL3*
            D:\a\_temp\msys64\mingw64\include\SDL3
            D:\a\_temp\msys64\mingw64\include\SDL3_image
            D:\a\_temp\msys64\mingw64\include\SDL3_ttf
            D:\a\_temp\msys64\mingw64\include\SDL3_mixer
            D:\a\_temp\msys64\mingw64\include\SDL3_net
          key: sdl3-source-${{ runner.os }}-${{ hashFiles('.gitmodules', 'sdl3/build_sdl.sh') }}

      - name: Build all SDL3 libs from source
        if: steps.sdl-source-cache.outputs.cache-hit != 'true'
        run: bash sdl3/build_sdl.sh

      - name: Verify SDL3 libraries
        run: |
          echo "=== SDL3 DLLs ==="
          ls /mingw64/bin/SDL3*.dll /mingw64/bin/libSDL3*.dll 2>/dev/null || true
          echo "=== SDL3 import libs ==="
          ls /mingw64/lib/libSDL3* 2>/dev/null || true
          echo "=== Include dirs ==="
          ls /mingw64/include/SDL3/ 2>/dev/null | head -5

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Patch Konan MinGW sysroot
        run: |
          # Kotlin/Native bundles an outdated MinGW sysroot whose CRT objects
          # reference symbols missing from its bundled libs.  Copy the system
          # MSYS2 CRT libs over so the linker can resolve them.
          # NOTE: $HOME in MSYS2 != Windows home; use USERPROFILE for .konan path
          WIN_HOME="$(cygpath "$USERPROFILE")"
          KONAN_MINGW="$WIN_HOME/.konan/dependencies/msys2-mingw-w64-x86_64-2/x86_64-w64-mingw32/lib"
          if [ ! -d "$KONAN_MINGW" ]; then
            echo "Konan sysroot not found, triggering download..."
            ./gradlew :kengine:cinteropSdl3Native || true
          fi
          echo "KONAN_MINGW=$KONAN_MINGW"
          ls "$KONAN_MINGW"/*.o 2>/dev/null | head -5
          if [ -d "$KONAN_MINGW" ]; then
            echo "Patching Konan sysroot at $KONAN_MINGW"
            cp -v /mingw64/x86_64-w64-mingw32/lib/libmingwex.a "$KONAN_MINGW/"
            cp -v /mingw64/x86_64-w64-mingw32/lib/libmingw32.a "$KONAN_MINGW/"
            echo "Done"
          else
            echo "ERROR: Konan MinGW sysroot not found at $KONAN_MINGW"
            echo "Checking alternative locations..."
            find "$WIN_HOME/.konan" -name "crt2.o" 2>/dev/null || echo "No crt2.o found"
          fi

      - name: Build all modules
        env:
          MSYS2_ROOT: D:/a/_temp/msys64
        run: |
          ./gradlew clean build -x allTests -x nativeTest -x jvmTest -x jsTest

      - name: Compile and run kengine tests
        env:
          MSYS2_ROOT: D:/a/_temp/msys64
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          ./gradlew :kengine:linkDebugTestNative || true
          if [ -f ./kengine/build/bin/native/debugTest/test.kexe ]; then
            # Copy DLLs next to the test binary
            cp /mingw64/bin/SDL3.dll ./kengine/build/bin/native/debugTest/ 2>/dev/null || true
            cp /mingw64/bin/libSDL3.dll ./kengine/build/bin/native/debugTest/ 2>/dev/null || true
            cp /mingw64/bin/SDL3_image.dll ./kengine/build/bin/native/debugTest/ 2>/dev/null || true
            cp /mingw64/bin/SDL3_ttf.dll ./kengine/build/bin/native/debugTest/ 2>/dev/null || true
            cp /mingw64/bin/SDL3_mixer.dll ./kengine/build/bin/native/debugTest/ 2>/dev/null || true
            cp /mingw64/bin/SDL3_net.dll ./kengine/build/bin/native/debugTest/ 2>/dev/null || true
            ./kengine/build/bin/native/debugTest/test.kexe \
              "--ktest_filter=*-*IT.*:*TiledMapLoaderTest.*"
          fi
